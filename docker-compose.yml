version: "3.9"

services:
  #  Backend API 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV:    production
      PORT:        4000
      JWT_SECRET:  ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      CORS_ORIGIN: http://localhost
    ports:
      - "4000:4000"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout:  5s
      retries:  3

  #  Frontend (nginx SPA) 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local
